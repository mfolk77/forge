# ============================================================
# RUST IDIOMS DISTILLATION PROMPTS
# ============================================================

[rust-idioms.instruction]
description = "Generate Rust idiom instruction pairs from pattern extracts"
prompt_template = """
Given these Rust code patterns extracted from a production codebase:

```
{code}
```

Pattern category: {why}

Generate {count} instruction-response pairs that teach idiomatic Rust:
- Show the idiomatic way to solve the problem
- Explain WHY it's idiomatic (ownership, borrowing, type safety)
- Show common mistakes (fighting the borrow checker, unnecessary clones)
- Include compiler error examples where relevant

Format each as JSON:
{{"instruction": "...", "response": "..."}}
"""
count = 5

[rust-idioms.conversation]
description = "Generate Rust refactoring conversations"
prompt_template = """
Given these Rust patterns:

```
{code}
```

Pattern: {why}

Generate a conversation where:
1. Developer shows non-idiomatic code
2. Assistant identifies issues
3. Developer asks for idiomatic version
4. Assistant refactors with explanation
5. Developer asks follow-up about the pattern

Format as JSON array.
"""

[rust-idioms.negative]
description = "Generate anti-pattern → fix examples"
prompt_template = """
Given these CORRECT Rust patterns:

```
{code}
```

Pattern: {why}

Generate {count} anti-pattern examples:
- Code that compiles but is wrong (unnecessary clone, blocking in async, etc.)
- Code that won't compile + the compiler error + the fix
- Code that has subtle bugs (data races, use-after-free risks)

Format as:
{{"instruction": "What's wrong with this Rust code?\\n```[anti-pattern]```", "response": "[analysis + idiomatic fix]"}}
"""
count = 4

